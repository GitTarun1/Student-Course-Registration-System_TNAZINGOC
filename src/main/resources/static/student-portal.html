<!DOCTYPE html>
<html>
<head>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h1>Student Portal</h1>

        <button
                class="btn btn-secondary"
                onclick="logout()">
            Logout
        </button>

    </div>

    <div class="alert alert-success">
        <h4 id="welcomeMessage" class="mb-0"></h4>
    </div>


    <h2>Available Courses</h2>

    <table
            class="table table-striped table-hover"
            id="courseTable">
        <tr>
            <th>Course Name</th>
            <th>Course Code</th>
            <th>Credits</th>
            <th>Available Seats</th>
            <th>Action</th>
        </tr>
    </table>

    <h2>My Courses</h2>

    <table
            class="table table-striped table-hover"
            id="myCoursesTable">
        <tr>
            <th>Course Name</th>
            <th>Action</th>
        </tr>
    </table>

    <script>

        let loggedInUser = null;

        function loadPortal() {

            loadAvailableCourses();
            loadMyCourses();
        }

        function loadAvailableCourses() {

            fetch("http://localhost:8080/courses")
                .then(response => response.json())
                .then(courses => {

                    const table = document.getElementById("courseTable");

                    table.innerHTML = `
                <tr>
                    <th>Course Name</th>
                    <th>Course Code</th>
                    <th>Credits</th>
                    <th>Available Seats</th>
                    <th>Action</th>
                </tr>
            `;

                    courses.forEach(course => {

                        table.innerHTML += `
                    <tr>
                        <td>${course.courseName}</td>
                        <td>${course.courseCode}</td>
                        <td>${course.credits}</td>
                        <td>${course.availableSeats}</td>
                        <td>
<button
    class="btn btn-success btn-sm"
    onclick="registerCourse(${course.id})">                                Register
                            </button>
                        </td>
                    </tr>
                `;

                    });

                });
        }

        function registerCourse(courseId) {

            const studentId = loggedInUser.studentId;

            const enrollment = {
                studentId: studentId,
                courseId: courseId
            };

            fetch("http://localhost:8080/enrollments", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(enrollment)
            })
                .then(response => response.text())
                .then(message => {

                    alert(message);

                    loadAvailableCourses();
                    loadMyCourses();
                });
        }

        function loadMyCourses() {

            const studentId = loggedInUser.studentId;

            fetch(`http://localhost:8080/enrollments/student-enrollments/${studentId}`)
                .then(response => response.json())
                .then(enrollments => {

                    const table = document.getElementById("myCoursesTable");

                    table.innerHTML = `
                <tr>
                    <th>Course Name</th>
                    <th>Action</th>
                </tr>
            `;

                    enrollments.forEach(enrollment => {

                        table.innerHTML += `
                    <tr>
                        <td>${enrollment.courseName}</td>
                        <td>
<button
    class="btn btn-danger btn-sm"
    onclick="dropCourse(${enrollment.enrollmentId})">                                Drop
                            </button>
                        </td>
                    </tr>
                `;

                    });

                });
        }

        function dropCourse(enrollmentId) {

            if (!confirm("Are you sure you want to drop this course?")) {
                return;
            }

            fetch(`http://localhost:8080/enrollments/${enrollmentId}`, {
                method: "DELETE"
            })
                .then(response => response.text())
                .then(message => {

                    alert(message);

                    loadAvailableCourses();
                    loadMyCourses();
                });
        }

        window.onload = function () {

            loggedInUser =
                JSON.parse(
                    localStorage.getItem("loggedInUser")
                );

            document.getElementById("welcomeMessage")
                .innerText =
                "Welcome, " + loggedInUser.username + "!";

            loadPortal();
        };

        function logout() {

            localStorage.removeItem("loggedInUser");

            window.location.href = "login.html";
        }
    </script>
</div>
</body>
</div>
</html>
