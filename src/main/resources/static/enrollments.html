<!DOCTYPE html>
<html>
<head>

    <
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container mt-4">

    <div class="card shadow mb-4">

        <div class="card-body">

            <h1 class="text-center mb-4">
                Enrollment Management
            </h1>
            <h1>Enrollment Management</h1>

            <h2>Enroll Student</h2>

            <form>

                <label>Student:</label><br>
                <select id="studentId" class="form-select"></select><br><br>

                <label>Course:</label><br>
                <select id="courseId" class="form-select"></select><br><br>

                <button
                        type="button"
                        class="btn btn-primary"
                        onclick="addEnrollment()">
                    Enroll Student
                </button>

            </form>

            <br>

            <button
                    type="button"
                    class="btn btn-success"
                    onclick="loadEnrollments()">
                Load Enrollments
            </button>

            <br><br>

            <table
                    class="table table-striped table-hover"
                    id="enrollmentTable">
                <tr>
                    <th>ID</th>
                    <th>Student ID</th>
                    <th>Student Name</th>
                    <th>Course Name</th>
                    <th>Action</th>
                </tr>
            </table>

            <script>

                function addEnrollment() {

                    const enrollment = {
                        studentId: document.getElementById("studentId").value,
                        courseId: document.getElementById("courseId").value
                    };

                    fetch("http://localhost:8080/enrollments", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify(enrollment)
                    })
                        .then(response => response.text())
                        .then(message => {
                            alert(message);
                            loadEnrollments();
                        });
                }

                function loadEnrollments() {

                    fetch("http://localhost:8080/enrollments")
                        .then(response => response.json())
                        .then(enrollments => {

                            const table = document.getElementById("enrollmentTable");

                            table.innerHTML = `
                <tr>
                    <th>ID</th>
                    <th>Student ID</th>
                    <th>Student Name</th>
                    <th>Course Name</th>
                    <th>Action</th>
                </tr>
            `;

                            enrollments.forEach(enrollment => {

                                const row = `
                    <tr>
                        <td>${enrollment.id}</td>
                        <td>${enrollment.studentId}</td>
                        <td>${enrollment.studentName}</td>
                        <td>${enrollment.courseName}</td>
                        <td>
                            <button
    type="button"
    class="btn btn-danger btn-sm"
    onclick="deleteEnrollment(${enrollment.id})">
                                Delete
                            </button>
                        </td>
                    </tr>
                `;

                                table.innerHTML += row;
                            });

                        });
                }

                function deleteEnrollment(id) {

                    if (!confirm("Are you sure you want to delete this enrollment?")) {
                        return;
                    }

                    fetch(`http://localhost:8080/enrollments/${id}`, {
                        method: "DELETE"
                    })
                        .then(response => response.text())
                        .then(message => {
                            alert(message);
                            loadEnrollments();
                        });
                }

                function loadStudentsDropdown() {

                    fetch("http://localhost:8080/students")
                        .then(response => response.json())
                        .then(students => {

                            const studentSelect = document.getElementById("studentId");
                            studentSelect.innerHTML = "";

                            students.forEach(student => {

                                studentSelect.innerHTML += `
                    <option value="${student.id}">
                        ${student.firstName} ${student.lastName}
                    </option>
                `;

                            });

                        });
                }

                function loadCoursesDropdown() {

                    fetch("http://localhost:8080/courses")
                        .then(response => response.json())
                        .then(courses => {

                            const courseSelect = document.getElementById("courseId");
                            courseSelect.innerHTML = "";

                            courses.forEach(course => {

                                courseSelect.innerHTML += `
                    <option value="${course.id}">
                        ${course.courseName}
                    </option>
                `;

                            });

                        });
                }

                window.onload = function () {
                    loadStudentsDropdown();
                    loadCoursesDropdown();
                    loadEnrollments();
                };

            </script>
        </div>

    </div>

</div>
</body>
</div>
</html>
