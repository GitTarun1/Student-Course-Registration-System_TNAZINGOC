<!DOCTYPE html>
<html>
<head>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container mt-4">

    <div class="card shadow mb-4">

        <div class="card-body">

            <h1 class="text-center mb-4">
                Course Management
            </h1>
            <h1>Course Management System</h1>

            <h2>Add / Update Course</h2>

            <form>

                <input type="hidden" id="courseId">

                <label>Course Name:</label><br>
                <input type="text" id="courseName" class="form-control"><br><br>

                <label>Course Code:</label><br>
                <input type="text" id="courseCode" class="form-control"><br><br>

                <label>Credits:</label><br>
                <input type="number" id="credits" class="form-control"><br><br>

                <label>Available Seats:</label><br>
                <input type="number" id="availableSeats" class="form-control"><br><br>

                <button
                        type="button"
                        class="btn btn-primary"
                        onclick="saveCourse()">
                    Save Course
                </button>

            </form>

            <br>

            <button
                    type="button"
                    class="btn btn-success"
                    onclick="loadCourses()">
                Load Courses
            </button>

            <br><br>

            <table
                    class="table table-striped table-hover"
                    id="courseTable">
                <tr>
                    <th>ID</th>
                    <th>Course Name</th>
                    <th>Course Code</th>
                    <th>Credits</th>
                    <th>Available Seats</th>
                    <th>Actions</th>
                </tr>
            </table>

            <script>

                function saveCourse() {

                    const id = document.getElementById("courseId").value;

                    const course = {
                        courseName: document.getElementById("courseName").value,
                        courseCode: document.getElementById("courseCode").value,
                        credits: document.getElementById("credits").value,
                        availableSeats: document.getElementById("availableSeats").value
                    };

                    if (id) {

                        fetch(`http://localhost:8080/courses/${id}`, {
                            method: "PUT",
                            headers: {
                                "Content-Type": "application/json"
                            },
                            body: JSON.stringify(course)
                        })
                            .then(response => response.text())
                            .then(message => {
                                alert(message);

                                document.getElementById("courseId").value = "";
                                document.getElementById("courseName").value = "";
                                document.getElementById("courseCode").value = "";
                                document.getElementById("credits").value = "";
                                document.getElementById("availableSeats").value = "";

                                loadCourses();
                            });

                    } else {

                        fetch("http://localhost:8080/courses", {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json"
                            },
                            body: JSON.stringify(course)
                        })
                            .then(response => response.text())
                            .then(message => {
                                alert(message);

                                document.getElementById("courseName").value = "";
                                document.getElementById("courseCode").value = "";
                                document.getElementById("credits").value = "";
                                document.getElementById("availableSeats").value = "";

                                loadCourses();
                            });
                    }
                }

                function loadCourses() {

                    fetch("http://localhost:8080/courses")
                        .then(response => response.json())
                        .then(courses => {

                            const table = document.getElementById("courseTable");

                            table.innerHTML = `
                <tr>
                    <th>ID</th>
                    <th>Course Name</th>
                    <th>Course Code</th>
                    <th>Credits</th>
                    <th>Available Seats</th>
                    <th>Actions</th>
                </tr>
            `;

                            courses.forEach(course => {

                                const row = `
                    <tr>
                        <td>${course.id}</td>
                        <td>${course.courseName}</td>
                        <td>${course.courseCode}</td>
                        <td>${course.credits}</td>
                        <td>${course.availableSeats}</td>
                        <td>

                            <button
    type="button"
    class="btn btn-warning btn-sm"
                                onclick="fillCourseForm(
                                    ${course.id},
                                    '${course.courseName}',
                                    '${course.courseCode}',
                                    ${course.credits},
                                    ${course.availableSeats}
                                )">
                                Update
                            </button>

                            <button
    type="button"
    class="btn btn-danger btn-sm"
                                onclick="deleteCourse(${course.id})">
                                Delete
                            </button>

                        </td>
                    </tr>
                `;

                                table.innerHTML += row;
                            });

                        });
                }

                function fillCourseForm(id, courseName, courseCode, credits, availableSeats) {

                    document.getElementById("courseId").value = id;
                    document.getElementById("courseName").value = courseName;
                    document.getElementById("courseCode").value = courseCode;
                    document.getElementById("credits").value = credits;
                    document.getElementById("availableSeats").value = availableSeats;
                }

                function deleteCourse(id) {

                    if (!confirm("Are you sure you want to delete this course?")) {
                        return;
                    }

                    fetch(`http://localhost:8080/courses/${id}`, {
                        method: "DELETE"
                    })
                        .then(response => response.text())
                        .then(message => {
                            alert(message);
                            loadCourses();
                        });
                }

            </script>
        </div>

    </div>

</div>
</body>
</div>
</html>
